<!DOCTYPE html>
<html>
<head>
<style>
  .swatch-group {
    display: flex;
    gap: 10px;
  }

  /* Hide the radio input */
  .swatch-input {
    position: absolute;
    width: 0;
    height: 0;
    opacity: 0;
  }

  /* The visible circle */
  .swatch-label {
    display: block;
    width: 24px;
    height: 24px;
    border-radius: 50%;
    cursor: pointer;
    /* outline: 1px solid #fff; */
    transition: all 0.2s ease;
    border: 2px solid #fff;
    box-shadow: 0 0 0 1px black;
  }

  /* When checked: white border + black outer ring */
  .swatch-input:checked + .swatch-label {
    border: 2px solid white;
    
  }
</style>
</head>
<body>

<div class="swatch-group">

  <input type="radio" name="color" id="auburn" class="swatch-input" checked>
  <label for="auburn" class="swatch-label" style="background-color: rgb(128, 64, 48);"></label>

  <input type="radio" name="color" id="cultured-blue" class="swatch-input">
  <label for="cultured-blue" class="swatch-label" style="background-color: rgb(135, 154, 171);"></label>

  <input type="radio" name="color" id="olive" class="swatch-input">
  <label for="olive" class="swatch-label" style="background-color: rgb(107, 114, 77);"></label>

  <input type="radio" name="color" id="gold" class="swatch-input">
  <label for="gold" class="swatch-label" style="background-color: rgb(196, 158, 58);"></label>

  <input type="radio" name="color" id="blizzard" class="swatch-input">
  <label for="blizzard" class="swatch-label" style="background-color: rgb(230, 230, 225); outline-color: #aaa;"></label>

</div>

</body>
</html>
